<svg width="1500" height="400" viewBox="0 0 1500 400" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="&#39;Segoe UI&#39;, &#39;Helvetica Neue&#39;, Helvetica, Arial, sans-serif">
